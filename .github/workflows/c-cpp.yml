name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: compilar o teste
      run: gcc test_jogo-da-velha.c -o test_jogo-da-velha
    - name: executar o teste
      run: ./test_jogo-da-velha
    - name: compilar o programa principal
      run: gcc jogo-da-velha.c -o jogo-da-velha
    - name: executar o programa principal
      run: ./jogo-da-velha X
